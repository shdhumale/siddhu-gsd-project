<div class="dashboard-container mat-elevation-z8">
  <mat-toolbar-row>
    <span>Ticket Dashboard</span>
    <span class="spacer"></span>
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search tickets...</mat-label>
      <input matInput [formControl]="searchControl">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="spacer" style="width: 24px;"></span>
    <button mat-raised-button color="primary" (click)="openCreateDialog()">
      <mat-icon>add</mat-icon>
      Create Ticket
    </button>
  </mat-toolbar-row>

  <table mat-table [dataSource]="dataSource" matSort>

    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
      <td mat-cell *matCellDef="let element"> {{element.id}} </td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
      <td mat-cell *matCellDef="let element"> {{element.name}} </td>
    </ng-container>

    <!-- Description Column -->
    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Description </th>
      <td mat-cell *matCellDef="let element"> {{element.description}} </td>
    </ng-container>

    <!-- Status Column -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Status </th>
      <td mat-cell *matCellDef="let element">
        <span class="status-badge" [ngClass]="element.status.toLowerCase()">
          {{element.status}}
        </span>
      </td>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button color="primary" (click)="openEditDialog(element); $event.stopPropagation()">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="confirmDelete(element); $event.stopPropagation()">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="openEditDialog(row)"></tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Select page of tickets">
  </mat-paginator>

  <div class="status-summary" style="margin-top: 32px; padding: 20px;">
    <h3 style="margin-bottom: 16px; color: #3f51b5;">Ticket Status Distribution</h3>
    <div class="status-cards"
      style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px;">
      <div class="status-card" *ngFor="let status of Object.keys(statusCounts)"
        style="padding: 16px; border-radius: 8px; text-align: center;">
        <div class="status-count" style="font-size: 24px; font-weight: bold;">{{ statusCounts[status] }}</div>
        <div class="status-label" style="text-transform: uppercase; font-size: 12px; margin-top: 4px;">{{ status }}
        </div>
        <div class="status-percent" style="font-size: 11px; color: #666; margin-top: 2px;">{{ (statusCounts[status] /
          totalTickets * 100) | number:'1.0-0' }}%</div>
      </div>
    </div>
  </div>
</div>
